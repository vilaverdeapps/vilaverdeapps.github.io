<head>

  <link rel="canonical" href="https://vilaverdeapps.github.io/patter/MARKETING.html" />
  <meta name="robots" content="index,follow" />
  <meta name="author" content="vilaverdeapps" />

  <meta property="og:site_name" content="Patter" />
  <meta property="og:title" content="Patter — Language learning that feels like texting a friend" />
  <meta property="og:description" content="Chat with AI personas, get real-time grammar corrections, and learn at your level. Serverless, BYOK, no account required." />
  <meta property="og:url" content="https://vilaverdeapps.github.io/patter/MARKETING.html" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Patter — Language learning that feels like texting a friend" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MobileApplication",
    "name": "Patter",
    "operatingSystem": "iOS 18.6",
    "applicationCategory": "EducationApplication",
    "offers": { "@type": "Offer", "priceCurrency": "USD" },
    "description": "Serverless iOS language-learning app. Chat with AI personas who stay in character, get real-time grammar corrections, and learn at your CEFR level. Bring your own API key.",
    "author": { "@type": "Organization", "name": "vilaverdeapps" }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #f5f0e8; font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { overflow-x: hidden; }
    a { color: inherit; }

    /* Nav */
    .pc-nav { display: flex; align-items: center; justify-content: space-between; padding: 24px 56px; }
    .pc-nav-links { display: flex; align-items: center; gap: 32px; }

    /* Hero */
    .pc-hero { padding: 64px 56px 80px; position: relative; overflow: hidden; }
    .pc-hero-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 64px; align-items: center; max-width: 1280px; }
    .pc-hero-phone { display: flex; justify-content: center; align-items: center; position: relative; }
    .pc-hero-h1 { font-size: 86px; line-height: 0.98; letter-spacing: -2.2px; margin: 28px 0 24px; font-weight: 400; }

    /* How it works */
    .pc-hiw { padding: 96px 56px; }
    .pc-hiw-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; }
    .pc-hiw-h2 { font-size: 56px; line-height: 1; letter-spacing: -1.2px; margin: 20px 0 56px; font-weight: 400; max-width: 720px; }

    /* Features */
    .pc-features { padding: 96px 56px; }
    .pc-features-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 48px; gap: 48px; }
    .pc-features-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .pc-features-h2 { font-size: 56px; line-height: 1; letter-spacing: -1.2px; margin: 0; font-weight: 400; max-width: 640px; }

    /* Languages */
    .pc-lang { padding: 96px 56px; }
    .pc-lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
    .pc-lang-h2 { font-size: 56px; line-height: 1; letter-spacing: -1.2px; margin: 20px 0 16px; font-weight: 400; max-width: 760px; }

    /* Privacy */
    .pc-privacy { padding: 120px 56px; }
    .pc-privacy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; margin-top: 48px; }
    .pc-privacy-h2 { font-size: 64px; line-height: 1.05; letter-spacing: -1.4px; font-weight: 400; margin: 0 0 40px; }
    .pc-privacy-badges { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 64px; }

    /* Footer */
    .pc-footer { padding: 96px 56px 48px; }
    .pc-footer-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 64px; align-items: flex-end; padding-bottom: 56px; }
    .pc-footer-h2 { font-size: 72px; line-height: 0.98; letter-spacing: -1.8px; margin: 0; font-weight: 400; }
    .pc-footer-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }

    /* Tablet — 900px */
    @media (max-width: 900px) {
      .pc-nav { padding: 18px 32px; }
      .pc-hero { padding: 48px 32px 64px; }
      .pc-hero-grid { grid-template-columns: 1fr; gap: 40px; }
      .pc-hero-h1 { font-size: clamp(48px, 8vw, 72px); }
      .pc-hiw { padding: 64px 32px; }
      .pc-hiw-grid { grid-template-columns: 1fr; gap: 32px; }
      .pc-hiw-h2 { font-size: clamp(36px, 6vw, 48px); margin-bottom: 40px; }
      .pc-features { padding: 64px 32px; }
      .pc-features-header { flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 32px; }
      .pc-features-grid { grid-template-columns: 1fr 1fr; }
      .pc-features-h2 { font-size: clamp(36px, 6vw, 48px); }
      .pc-lang { padding: 64px 32px; }
      .pc-lang-grid { grid-template-columns: repeat(3, 1fr); }
      .pc-lang-h2 { font-size: clamp(36px, 6vw, 48px); }
      .pc-privacy { padding: 80px 32px; }
      .pc-privacy-grid { grid-template-columns: 1fr; gap: 24px; }
      .pc-privacy-h2 { font-size: clamp(36px, 7vw, 52px); }
      .pc-privacy-badges { margin-top: 40px; }
      .pc-footer { padding: 64px 32px 40px; }
      .pc-footer-grid { grid-template-columns: 1fr; gap: 32px; }
      .pc-footer-h2 { font-size: clamp(42px, 8vw, 60px); }
      .pc-footer-bottom { flex-direction: column; align-items: flex-start; gap: 16px; }
    }

    /* Mobile — 600px */
    @media (max-width: 600px) {
      .pc-nav { padding: 14px 20px; }
      .pc-nav-links { display: none; }
      .pc-hero { padding: 32px 20px 48px; }
      .pc-hero-h1 { font-size: clamp(36px, 10vw, 52px); }
      .pc-hero-phone { display: none; }
      .pc-hiw { padding: 48px 20px; }
      .pc-features { padding: 48px 20px; }
      .pc-features-grid { grid-template-columns: 1fr; }
      .pc-lang { padding: 48px 20px; }
      .pc-lang-grid { grid-template-columns: repeat(2, 1fr); }
      .pc-privacy { padding: 56px 20px; }
      .pc-footer { padding: 48px 20px 32px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const PC = {
  bg: '#f5f0e8',
  bgAlt: '#ece4d5',
  ink: '#1f1a14',
  inkSoft: '#5a4a38',
  inkMuted: '#8a7a64',
  accent: '#FF6A3D',
  sun: '#E85D75',
  forest: '#3D8B6E',
  ocean: '#3D7AE8',
  line: 'rgba(31,26,20,0.12)',
  serif: '"Newsreader", "Source Serif Pro", Georgia, serif',
  sans: '"Inter", system-ui, sans-serif',
  mono: '"Geist Mono", ui-monospace, monospace',
};

const CONVERSATIONS = {
  pt_pt: {
    persona: { name: 'Sofia Mendes' },
    messages: [
      { from: 'ai', text: 'Por favor, não te preocupes! Quando regressares, contas-me tudo sobre a Roménia e os planos de Sintra.' },
      { from: 'me', text: 'Nunca tive os pastéis do Raleigh. Onde está pastelaria fica?',
        dica: { wrong: 'Onde está pastelaria fica?', right: 'Onde fica a pastelaria?', note: 'Use "fica" with a location — and don\'t forget the article "a".' } },
      { from: 'ai', text: 'A pastelaria Raleigh fica na Rua do Norte, 42, bem perto da estação de comboios. Já foste lá antes?' },
    ]
  },
  ja: {
    persona: { name: 'Haruki' },
    messages: [
      { from: 'ai', text: 'おはよう！今日は何してるの？' },
      { from: 'me', text: '友達とラーメン食べに行く',
        dica: { wrong: '友達と', right: '友達とラーメンを食べに', note: 'Particle を marks the direct object (ramen).' } },
      { from: 'ai', text: 'いいなあ！どこのラーメン屋？' },
    ]
  },
  es_es: {
    persona: { name: 'Mateo' },
    messages: [
      { from: 'ai', text: '¿Qué tal el café de esta mañana?' },
      { from: 'me', text: 'Muy bueno, gracias. Tomé un cortado' },
      { from: 'ai', text: '¡Cortado, muy español! ¿Y qué planes tienes hoy?' },
      { from: 'me', text: 'Voy a la museo del Prado',
        dica: { wrong: 'a la museo', right: 'al museo', note: '"Museo" is masculine — use "al" (a + el).' } },
    ]
  },
  fr: {
    persona: { name: 'Camille' },
    messages: [
      { from: 'ai', text: 'Tu viens déjeuner avec nous ?' },
      { from: 'me', text: "Oui, j'ai très faim" },
      { from: 'ai', text: 'On va chez Paul, le bistrot du coin. Bouchon lyonnais.' },
      { from: 'me', text: "Je connais pas. C'est quoi un bouchon ?",
        dica: { wrong: 'Je connais pas', right: 'Je ne le connais pas', note: 'Spoken French often drops "ne" — fine casually, but the full form is more polished.' } },
    ]
  },
  it: {
    persona: { name: 'Giulia' },
    messages: [
      { from: 'ai', text: 'Allora, hai provato il ragù?' },
      { from: 'me', text: 'Sì! Era buonissimo' },
      { from: 'ai', text: 'Bravissimo! Qui a Bologna è una religione.' },
      { from: 'me', text: 'Ho mangiato troppo pasta',
        dica: { wrong: 'troppo pasta', right: 'troppa pasta', note: '"Pasta" is feminine — "troppa" agrees in gender.' } },
    ]
  },
};

const PERSONAS = [
  { name: 'Inês',   emoji: '🌊', lang: 'pt-PT' },
  { name: 'Haruki', emoji: '🍜', lang: 'ja-JP' },
  { name: 'Mateo',  emoji: '☕', lang: 'es-ES' },
  { name: 'Camille',emoji: '🥐', lang: 'fr-FR' },
  { name: 'Giulia', emoji: '🍝', lang: 'it-IT' },
];

const LANGUAGES = [
  { name: 'English',    dialects: ['US', 'GB'],                      flag: '🇺🇸', sample: "Hey, how's it going?" },
  { name: 'Spanish',    dialects: ['Castilian', 'Latin American'],   flag: '🇪🇸', sample: '¿Qué tal?' },
  { name: 'Portuguese', dialects: ['European', 'Brazilian'],         flag: '🇵🇹', sample: 'Tudo bem?' },
  { name: 'French',     dialects: ['France', 'Canadian'],            flag: '🇫🇷', sample: 'Ça va?' },
  { name: 'German',     dialects: [],                                flag: '🇩🇪', sample: "Wie geht's?" },
  { name: 'Italian',    dialects: [],                                flag: '🇮🇹', sample: 'Come stai?' },
  { name: 'Japanese',   dialects: [],                                flag: '🇯🇵', sample: '元気？' },
  { name: 'Mandarin',   dialects: [],                                flag: '🇨🇳', sample: '你好吗？' },
  { name: 'Korean',     dialects: [],                                flag: '🇰🇷', sample: '잘 지내?' },
  { name: 'Russian',    dialects: [],                                flag: '🇷🇺', sample: 'Как дела?' },
  { name: 'Romanian',   dialects: [],                                flag: '🇷🇴', sample: 'Ce mai faci?' },
];

function ChatBubble({ from, text, dica, accent = '#FF6A3D', muted = '#2c2c2e', mutedText = '#fff', accentText = '#fff', size = 'md', showDica = true }) {
  const isMe = from === 'me';
  const s = { sm: { fs: 13, pad: '9px 14px', radius: 22, gap: 6 }, md: { fs: 15, pad: '11px 16px', radius: 24, gap: 7 } }[size] || { fs: 15, pad: '11px 16px', radius: 24, gap: 7 };
  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: isMe ? 'flex-end' : 'flex-start', gap: 3, marginBottom: s.gap }}>
      <div style={{ background: isMe ? accent : muted, color: isMe ? accentText : mutedText, padding: s.pad, borderRadius: s.radius, maxWidth: '78%', fontSize: s.fs, lineHeight: 1.32, wordBreak: 'break-word' }}>
        {text}
      </div>
      {showDica && dica && isMe && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, fontFamily: 'Inter, system-ui', color: '#5ac8fa', marginTop: 2, marginRight: 4 }}>
          <span>✨</span><span style={{ fontWeight: 500 }}>Correcção de IA</span>
        </div>
      )}
    </div>
  );
}

function PhoneFrame({ children, width = 320, height = 660 }) {
  return (
    <div style={{ width, height, background: '#1a1a1a', borderRadius: 44, padding: 10, boxShadow: '0 30px 80px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.06) inset', position: 'relative' }}>
      <div style={{ width: '100%', height: '100%', background: '#000', borderRadius: 34, overflow: 'hidden', position: 'relative' }}>
        <div style={{ position: 'absolute', top: 8, left: '50%', transform: 'translateX(-50%)', width: 96, height: 26, background: '#0a0a0a', borderRadius: 14, zIndex: 10 }} />
        {children}
      </div>
    </div>
  );
}

function ChatThread({ convo = 'pt_pt', accent = '#FF6A3D', mutedBubble = '#2c2c2e', showDica = true }) {
  const c = CONVERSATIONS[convo];
  if (!c) return null;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', background: '#000', color: '#fff' }}>
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 44, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 24px 0', fontSize: 13, fontWeight: 600, color: '#fff', fontFamily: '-apple-system, BlinkMacSystemFont, system-ui', zIndex: 5 }}>
        <span>11:37</span><span style={{ fontSize: 11, opacity: 0.9 }}>•••▸ －｢ 80</span>
      </div>
      <div style={{ paddingTop: 52, paddingBottom: 10, paddingLeft: 12, paddingRight: 12, display: 'flex', alignItems: 'center', gap: 8, background: '#000' }}>
        <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#1c1c1e', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14 }}>‹</div>
        <div style={{ flex: 1, textAlign: 'center', fontSize: 15, fontWeight: 600, fontFamily: 'Inter, system-ui' }}>{c.persona.name}</div>
        <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#1c1c1e', display: 'flex', alignItems: 'center', justifyContent: 'center', color: accent, fontSize: 14 }}>▱</div>
      </div>
      <div style={{ flex: 1, padding: '4px 12px 8px', overflow: 'hidden', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
        {c.messages.map((m, i) => (
          <ChatBubble key={i} from={m.from} text={m.text} dica={m.dica} accent={accent} muted={mutedBubble} mutedText="#fff" size="sm" showDica={showDica} />
        ))}
      </div>
      <div style={{ padding: '8px 12px 6px', display: 'flex', alignItems: 'center', gap: 8, background: '#000' }}>
        <div style={{ flex: 1, height: 34, borderRadius: 17, background: '#1c1c1e', display: 'flex', alignItems: 'center', padding: '0 14px', fontSize: 12, color: '#8e8e93', fontFamily: 'Inter, system-ui' }}>Mensagem…</div>
        <div style={{ width: 34, height: 34, borderRadius: '50%', background: '#2c2c2e', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 14, fontWeight: 700 }}>↑</div>
      </div>
      <div style={{ textAlign: 'center', fontSize: 9.5, color: '#8e8e93', fontFamily: 'Inter, system-ui', paddingBottom: 14 }}>Patter é IA e pode cometer erros</div>
    </div>
  );
}

function PCBadge({ children, color = PC.accent }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, whiteSpace: 'nowrap', fontFamily: PC.mono, fontSize: 11, color, letterSpacing: 1, textTransform: 'uppercase', padding: '5px 10px', border: `1px solid ${color}40`, borderRadius: 999, background: `${color}0c` }}>{children}</span>
  );
}

function PCNav({ accent = PC.accent }) {
  return (
    <nav className="pc-nav" style={{ borderBottom: `1px solid ${PC.line}` }}>
      <a href="/patter/MARKETING.html" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none' }}>
        <img src="/assets/patter-icon.png" alt="" style={{ width: 32, height: 32, borderRadius: 8, display: 'block' }} />
        <span style={{ fontFamily: PC.serif, fontSize: 21, fontWeight: 500, color: PC.ink, letterSpacing: -0.3 }}>Patter</span>
      </a>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <div className="pc-nav-links" style={{ fontFamily: PC.sans, fontSize: 13.5, color: PC.inkSoft }}>
          <a href="#features" style={{ color: 'inherit', textDecoration: 'none' }}>Features</a>
          <a href="#languages" style={{ color: 'inherit', textDecoration: 'none' }}>Languages</a>
          <a href="/patter/FAQ.html" style={{ color: 'inherit', textDecoration: 'none' }}>FAQ</a>
          <a href="/patter/PRIVACY.html" style={{ color: 'inherit', textDecoration: 'none' }}>Privacy</a>
          <a href="/patter/SUPPORT.html" style={{ color: 'inherit', textDecoration: 'none' }}>Support</a>
        </div>
        <a href="https://apps.apple.com/us/app/patter-language-learning/id6762643113" style={{ fontFamily: PC.sans, fontSize: 13, fontWeight: 600, color: '#fff', background: PC.ink, padding: '9px 16px', borderRadius: 999, textDecoration: 'none', whiteSpace: 'nowrap' }}>Get the app</a>
      </div>
    </nav>
  );
}

function PCHero({ accent = PC.accent, convo = 'pt_pt' }) {
  return (
    <section className="pc-hero">
      <div style={{ position: 'absolute', top: 80, right: 80, width: 120, height: 140, background: `repeating-linear-gradient(45deg, ${accent}18, ${accent}18 6px, transparent 6px, transparent 12px)`, borderRadius: 6, transform: 'rotate(8deg)', opacity: 0.6 }} />
      <div className="pc-hero-grid">
        <div>
          <PCBadge>Now on the App Store · iOS 18.6+</PCBadge>
          <h1 className="pc-hero-h1" style={{ fontFamily: PC.serif, color: PC.ink }}>
            Like texting<br />
            <span style={{ fontStyle: 'italic', color: accent }}>a friend</span> who<br />
            speaks the language<br />
            you're learning.
          </h1>
          <p style={{ fontFamily: PC.serif, fontSize: 21, lineHeight: 1.5, color: PC.inkSoft, margin: '0 0 36px', maxWidth: 520, fontWeight: 400 }}>
            Patter is a quiet little iOS app. Chat with AI personas — a shopkeeper in Lisbon,
            a friend in Tokyo — who stay in character and reply only in your target language.
            Corrections appear as you go.
          </p>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
            <a href="https://apps.apple.com/us/app/patter-language-learning/id6762643113" style={{ fontFamily: PC.sans, fontSize: 15, fontWeight: 600, color: '#fff', background: PC.ink, padding: '14px 24px', borderRadius: 999, textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 10, whiteSpace: 'nowrap' }}>
              <span style={{ fontSize: 18 }}>↓</span> Download for iPhone
            </a>
            <a href="#how-it-works" style={{ fontFamily: PC.sans, fontSize: 14, fontWeight: 500, color: PC.ink, background: 'transparent', padding: '14px 18px', borderRadius: 999, border: `1px solid ${PC.line}`, textDecoration: 'none', whiteSpace: 'nowrap' }}>How it works →</a>
          </div>
          <div style={{ marginTop: 48, display: 'flex', gap: 28, fontFamily: PC.sans, fontSize: 12.5, color: PC.inkMuted, flexWrap: 'wrap' }}>
            <span style={{ whiteSpace: 'nowrap' }}>· 11 languages, dialect-aware</span>
            <span style={{ whiteSpace: 'nowrap' }}>· No account</span>
            <span style={{ whiteSpace: 'nowrap' }}>· Bring your own API key</span>
          </div>
        </div>
        <div className="pc-hero-phone">
          <div style={{ position: 'absolute', width: 380, height: 520, background: PC.bgAlt, borderRadius: 18, transform: 'rotate(-4deg)', boxShadow: '0 20px 60px rgba(0,0,0,0.08)', border: `1px solid ${PC.line}` }} />
          <PhoneFrame width={320} height={620}>
            <ChatThread convo={convo} accent={accent} mutedBubble="#2c2c2e" showDica={true} />
          </PhoneFrame>
        </div>
      </div>
    </section>
  );
}

function PCHowItWorks({ accent = PC.accent }) {
  const steps = [
    { n: '01', title: 'Pick a language', body: 'Eleven languages, with dialect precision. European or Brazilian Portuguese. Castilian or Latin American Spanish. You choose.' },
    { n: '02', title: 'Create a contact', body: 'A persona — name, backstory, tone, interests. Inês runs a scarf shop in Lisbon. Haruki is your friend in Shibuya. They stay in character.' },
    { n: '03', title: 'Text them', body: "They reply only in the language you're learning. When you slip, a quiet correction appears below your message. No drills. No tests." },
  ];
  return (
    <section id="how-it-works" className="pc-hiw" style={{ background: PC.bgAlt, borderTop: `1px solid ${PC.line}`, borderBottom: `1px solid ${PC.line}` }}>
      <div style={{ maxWidth: 1280, margin: '0 auto' }}>
        <PCBadge color={PC.forest}>How it works</PCBadge>
        <h2 className="pc-hiw-h2" style={{ fontFamily: PC.serif, color: PC.ink }}>
          Three steps. <span style={{ fontStyle: 'italic', color: PC.inkSoft }}>Then it's just texting.</span>
        </h2>
        <div className="pc-hiw-grid">
